name: SimpleScreenStreamer
options:
  bundleIdPrefix: com.example
targets:
  SimpleScreenStreamer:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: SimpleScreenStreamer
        excludes:
          - Info.plist
    info:
      path: SimpleScreenStreamer/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Ứng dụng cần Microphone để truyền phát âm thanh nếu cần."
    dependencies:
      - package: WebRTC
        product: WebRTC
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: 104.0.0
