<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Viewer - View Màn Hình iOS</title>
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f1423;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #239eab;
            --primary-hover: #1b7f8a;
            --accent: #ff477e;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --matrix-green: #80e280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1b223d 0%, var(--bg-color) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .main-container {
            flex: 1;
            width: 100%;
            max-width: 1400px;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Screen Viewer Panel */
        .viewer-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 550px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px; /* Standard iPhone Aspect ratio container */
            aspect-ratio: 9 / 19.5;
            background: #000;
            border-radius: 40px;
            border: 6px solid #1a2035;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .video-wrapper.rotated {
            max-width: 700px;
            aspect-ratio: 19.5 / 9;
            border-radius: 24px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-text {
            position: absolute;
            text-align: center;
            color: var(--text-muted);
            padding: 20px;
            z-index: 2;
        }

        .placeholder-text svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            stroke: var(--primary);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Control / Settings Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .sidebar-card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(35, 158, 171, 0.2);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(35, 158, 171, 0.3);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.connected {
            background: var(--accent);
            box-shadow: 0 4px 12px rgba(255, 71, 126, 0.3);
        }

        /* Console / Log Terminal */
        .terminal-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 250px;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .terminal-header span {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .terminal-body {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--matrix-green);
            overflow-y: auto;
            max-height: 220px;
        }

        .log-line {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .log-time {
            color: var(--text-muted);
            margin-right: 8px;
        }

        /* Extra controls (Rotation, Fullscreen) */
        .viewer-controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 12px;
            z-index: 5;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <h1>Chrome Web Viewer</h1>
            <p>Trình truyền màn hình iOS thời gian thực (P2P)</p>
        </div>
        <div class="status-indicator">
            <span id="connection-badge" style="font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 6px;">
                <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:currentColor;"></span>
                Đã ngắt kết nối
            </span>
        </div>
    </header>

    <div class="main-container">
        <!-- Center Screen Viewer -->
        <div class="viewer-panel">
            <div class="video-wrapper" id="video-wrapper">
                <div class="placeholder-text" id="placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2" stroke-width="1.5"/>
                        <line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                    <h3>Chờ luồng video...</h3>
                    <p style="font-size: 13px; margin-top: 6px;">Nhập mã phòng bên phải và bấm kết nối.</p>
                </div>
                <video id="remote-video" autoplay playsinline></video>
            </div>

            <!-- Overlay controls -->
            <div class="viewer-controls">
                <button class="icon-btn" id="rotate-btn" title="Xoay màn hình (Ngang/Dọc)">
                    <svg viewBox="0 0 24 24">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                </button>
                <button class="icon-btn" id="fullscreen-btn" title="Toàn màn hình">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Sidebar Config & Console -->
        <div class="sidebar">
            <div class="sidebar-card">
                <h2>Cấu Hình Kết Nối</h2>
                <div class="input-group">
                    <label for="room-input">Mã Kết Nối Phòng</label>
                    <input type="text" id="room-input" maxlength="6" placeholder="000000">
                </div>
                <button class="btn" id="connect-btn">Kết Nối Với iPhone</button>
            </div>

            <div class="sidebar-card terminal-panel">
                <div class="terminal-header">
                    <span>Nhật ký kết nối (Logs)</span>
                    <span style="font-size: 11px; cursor: pointer; color: var(--primary);" id="clear-logs">Xóa</span>
                </div>
                <div class="terminal-body" id="log-terminal">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Logic Script -->
    <script src="main.js"></script>
</body>
</html>
