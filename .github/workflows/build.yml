name: Build SimpleScreenStreamer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Homebrew & Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SimpleScreenStreamer.xcodeproj \
            -scheme SimpleScreenStreamer \
            -derivedDataPath build

      - name: Build iOS Application (Unsigned for TrollStore)
        run: |
          xcodebuild -project SimpleScreenStreamer.xcodeproj \
            -scheme SimpleScreenStreamer \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build > build.log 2>&1 || (cat build.log && curl -H "Title: Build Failed" -d "$(tail -n 300 build.log)" https://ntfy.sh/viewman_build_errors && exit 1)

      - name: Package App into IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/SimpleScreenStreamer.app Payload/
          zip -r SimpleScreenStreamer.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleScreenStreamer-TrollStore
          path: SimpleScreenStreamer.ipa
